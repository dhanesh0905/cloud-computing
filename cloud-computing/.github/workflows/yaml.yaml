name: CI/CD Pipeline for Payment Microservice

on:
  push:
    branches: [ "main" ]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies (Auto-Detect)
      run: |
        python -m pip install --upgrade pip
        # Automatically search for requirements.txt in the workspace
        REQ_PATH=$(find . -name "requirements.txt" -print -quit)
        if [ -n "$REQ_PATH" ]; then
          echo "Found requirements.txt at: $REQ_PATH"
          pip install -r "$REQ_PATH"
        else
          echo "ERROR: requirements.txt not found!"
          ls -R
          exit 1
        fi
        
    - name: Run Tests (Auto-Detect)
      run: |
        # Automatically search for test_main.py in the workspace
        TEST_PATH=$(find . -name "test_main.py" -print -quit)
        if [ -n "$TEST_PATH" ]; then
          echo "Found test_main.py at: $TEST_PATH"
          # Go to the directory containing the tests so main.py imports work
          TARGET_DIR=$(dirname "$TEST_PATH")
          cd "$TARGET_DIR"
          pytest $(basename "$TEST_PATH")
        else
          echo "ERROR: test_main.py not found!"
          ls -R
          exit 1
        fi

    - name: Trigger Render Deployment
      env:
        deploy_url: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
      run: |
        curl "$deploy_url"